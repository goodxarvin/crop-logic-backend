services:
  db:
    image: docker.iranserver.com/mysql:8
    container_name: backend-db
    environment:
      MYSQL_DATABASE: ${DB_NAME:-backend}
      MYSQL_USER: ${DB_USER:-backend}
      MYSQL_PASSWORD: ${DB_PASSWORD:-changeme}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-changeme}
    volumes:
      - backend_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-changeme}"]
      interval: 5s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: docker-mirror.liara.ir/phpmyadmin:latest
    container_name: backend-phpmyadmin
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      UPLOAD_LIMIT: 64M
    ports:
      - "8082:80"
    depends_on:
      db:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: backend-redis
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "6380:6379"
    volumes:
      - backend_redis_data:/data


  web:
    build:
      context: .
      args:
        APT_MIRROR: mirror2.chabokan.net
        PIP_INDEX_URL: https://package-mirror.liara.ir/repository/pypi/simple
        PIP_EXTRA_INDEX_URL: https://mirror2.chabokan.net/pypi/simple
        PYTHON_MIRROR: mirror2.chabokan.net
    container_name: backend-web
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]
    volumes:
      - .:/app
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DOCKER_VERSION: ${DOCKER_VERSION:-develop}
      DB_HOST: db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery:
    build:
      context: .
      args:
        APT_MIRROR: mirror2.chabokan.net
        PIP_INDEX_URL: https://package-mirror.liara.ir/repository/pypi/simple
        PIP_EXTRA_INDEX_URL: https://mirror2.chabokan.net/pypi/simple
        PYTHON_MIRROR: mirror2.chabokan.net
    container_name: backend-celery
    command: ["celery", "-A", "config", "worker", "-l", "info"]
    volumes:
      - .:/app
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      DOCKER_VERSION: ${DOCKER_VERSION:-develop}
      DB_HOST: db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      CELERY_BROKER_CONNECTION_RETRY_ON_STARTUP: "true"
      SKIP_MIGRATE: "1"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend_mysql_data:
  backend_redis_data:
  backend_qdrant_data:
